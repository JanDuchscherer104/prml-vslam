# Canonical ViSTA-SLAM Pipeline Configuration
# -------------------------------------------
# This file defines a complete pipeline run config, including the source, SLAM
# backend overrides, stage-local evaluation/reconstruction policy, and
# visualization settings.

experiment_name = "vista-full-tuning"
mode            = "streaming"
output_dir      = ".artifacts"
ray_local_head_lifecycle = "ephemeral"

[stages.source]
enabled = true

    [stages.source.backend]
    source_id    = "advio"
    sequence_id  = "advio-20"
    frame_stride = 5

[stages.slam]
enabled = true

    [stages.slam.outputs]
    # ViSTA only emits dense pointmaps
    emit_dense_points  = true
    emit_sparse_points = false

    [stages.slam.backend]
    method_id = "vista"
    # Frame cap to stop the backend after N frames.
    max_frames = 1500

    # Maximum number of keyframes the pose graph may hold.
    max_view_num = 400

    # Optical-flow magnitude threshold that triggers a new keyframe.
    # Set to a negative value (e.g., -1.0) to force every packet to become a keyframe
    # and test true backpressure.
    flow_thres = 20

    # Number of temporal-neighbor edges per keyframe in the pose graph.
    neighbor_edge_num = 3

    # Maximum number of loop-closure edges added per keyframe.
    loop_edge_num = 3

    # Minimum frame distance for a valid loop-closure candidate.
    loop_dist_min = 40

    # Non-maximum suppression window for loop-closure candidates.
    loop_nms = 40

    # Loop candidate must share more neighbours than this threshold.
    loop_cand_thresh_neighbor = 5

    # Minimum point-confidence score retained in the reconstruction.
    point_conf_thres = 4.2

    # Maximum relative-pose uncertainty accepted for an edge.
    rel_pose_thres = 0.75

    # Pose-graph optimisation interval in keyframes.
    pgo_every = 500

    # Random seed set before model initialisation for reproducibility.
    random_seed = 43

[stages.align_ground]
enabled = true

    [stages.align_ground.ground]
    strategy       = "ransac_point_cloud"
    min_confidence = 0.6

[stages.evaluate_trajectory]
enabled = false

[stages.reconstruction]
enabled = true

    [stages.reconstruction.backend]
    reconstruction_id = "open3d_tsdf"
    extract_mesh      = true

[stages.evaluate_cloud]
enabled = false

[stages.summary]
enabled = true

# ------------------------------------------
# Visualization Configuration
# ------------------------------------------
[visualization]
# Whether to connect the Rerun live viewer via gRPC.
connect_live_viewer = true

# Whether one canonical repo-owned `.rrd` recording should be exported.
export_viewer_rrd = true

# Rerun gRPC endpoint used when `connect_live_viewer` is enabled.
grpc_url = "rerun+http://127.0.0.1:9876/proxy"

# Optional Rerun blueprint loaded by the auto-launched web viewer.
viewer_blueprint_path = ".configs/visualization/vista_blueprint.rbl"

# Keep only a few recent frusta visible in the streaming viewer.
frusta_history_window_streaming = 5

# Keep the full tracking trajectory visible.
show_tracking_trajectory = true
