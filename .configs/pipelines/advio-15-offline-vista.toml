experiment_name = "advio-15-offline-vista"
mode            = "offline"
output_dir      = ".artifacts"

[stages.source]
enabled = true

[stages.source.backend]
source_id = "advio"
sequence_id = "advio-15"

[stages.source.backend.dataset_serving]
pose_source = "ground_truth"
pose_frame_mode = "provider_world"

[stages.slam]
enabled = true

[stages.slam.outputs]
emit_dense_points  = true
emit_sparse_points = false

[stages.slam.backend]
method_id = "vista"

[stages.align_ground]
enabled = false

[stages.evaluate_trajectory]
enabled = false

[stages.reconstruction]
enabled = false

[stages.evaluate_cloud]
enabled = false

[stages.evaluate_efficiency]
enabled = false

[stages.summary]
enabled = true

[benchmark.reference]
enabled = false

[benchmark.trajectory]
enabled     = false
baseline_source = "ground_truth"

[benchmark.cloud]
enabled = false

[benchmark.efficiency]
enabled = false

[visualization]
export_viewer_rrd     = false
connect_live_viewer   = false
grpc_url              = "rerun+http://127.0.0.1:9876/proxy"
preserve_native_rerun = true
