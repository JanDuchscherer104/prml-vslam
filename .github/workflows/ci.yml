name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Typst
        uses: typst-community/setup-typst@v5

      - name: Install project
        run: uv sync --all-extras

      - name: Run CI suite
        run: make ci
