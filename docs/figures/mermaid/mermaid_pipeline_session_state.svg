<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 829.456 652.5" width="829.456" height="652.5" style="--bg:#eff1f5;--fg:#4c4f69;--line:#9ca0b0;--accent:#8839ef;--muted:#9ca0b0;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="arrowhead" markerWidth="8" markerHeight="5" refX="7" refY="2.5" orient="auto">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
  <marker id="arrowhead-start" markerWidth="8" markerHeight="5" refX="1" refY="2.5" orient="auto-start-reverse">
    <polygon points="8 0, 0 2.5, 8 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
</defs>
<polyline class="edge" data-from="_start" data-to="Idle" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="547.3058333333333,68 547.3058333333333,116" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="Idle" data-to="Connecting" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-label="start(request, plan, source, slam_backend)" points="547.3058333333333,152.9 547.3058333333333,269.20000000000005" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="Connecting" data-to="Running" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-label="manifest written and session opened" points="510.0566666666666,306.1 510.0566666666666,342.1 392.49799999999993,342.1 392.498,422.40000000000003" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="Connecting" data-to="Failed" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-label="pre-launch or setup error" points="584.555,306.1 584.555,439.00000000000006 702.1136666666666,439.00000000000006 702.1136666666666,563.6000000000001" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="Running" data-to="Completed" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-label="eof on bounded replay" points="314.95000000000005,459.3 314.95000000000005,471.30000000000007 148.7835,471.30000000000007 148.7835,563.6000000000001" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="Running" data-to="Stopped" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-label="explicit stop_run()" points="392.498,459.3 392.498,563.6000000000001" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="Running" data-to="Failed" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-label="runtime exception" points="470.04599999999994,459.3 470.04599999999994,471.30000000000007 614.7713333333334,471.30000000000007 614.7713333333334,563.6000000000001" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<g class="edge-label" data-from="Idle" data-to="Connecting" data-label="start(request, plan, source, slam_backend)">
  <rect x="438.30583333333334" y="195.9" width="217.82800000000003" height="30.3" rx="2" ry="2" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
  <text x="547.2198333333333" y="211.05" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-sec)" dy="3.8499999999999996">start(request, plan, source, slam_backend)</text>
</g>
<g class="edge-label" data-from="Connecting" data-to="Running" data-label="manifest written and session opened">
  <rect x="299.49799999999993" y="349.1" width="185.15800000000004" height="30.3" rx="2" ry="2" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
  <text x="392.07699999999994" y="364.25" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-sec)" dy="3.8499999999999996">manifest written and session opened</text>
</g>
<g class="edge-label" data-from="Connecting" data-to="Failed" data-label="pre-launch or setup error">
  <rect x="633.1136666666666" y="446.00000000000006" width="137.63800000000003" height="30.3" rx="2" ry="2" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
  <text x="701.9326666666666" y="461.15000000000003" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-sec)" dy="3.8499999999999996">pre-launch or setup error</text>
</g>
<g class="edge-label" data-from="Running" data-to="Completed" data-label="eof on bounded replay">
  <rect x="87.7835" y="478.30000000000007" width="121.60000000000001" height="30.3" rx="2" ry="2" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
  <text x="148.58350000000002" y="493.45000000000005" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-sec)" dy="3.8499999999999996">eof on bounded replay</text>
</g>
<g class="edge-label" data-from="Running" data-to="Stopped" data-label="explicit stop_run()">
  <rect x="341.49799999999993" y="502.30000000000007" width="101.40400000000002" height="30.3" rx="2" ry="2" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
  <text x="392.19999999999993" y="517.45" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-sec)" dy="3.8499999999999996">explicit stop_run()</text>
</g>
<g class="edge-label" data-from="Running" data-to="Failed" data-label="runtime exception">
  <rect x="564.2713333333334" y="478.30000000000007" width="100.21600000000001" height="30.3" rx="2" ry="2" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
  <text x="614.3793333333333" y="493.45000000000005" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-sec)" dy="3.8499999999999996">runtime exception</text>
</g>
<g class="node" data-id="_start" data-label="" data-shape="state-start">
  <circle cx="547.3058333333333" cy="54" r="12" fill="var(--_text)" stroke="none" />
</g>
<g class="node" data-id="Idle" data-label="Idle" data-shape="rounded">
  <rect x="515.9568333333333" y="116" width="62.69799999999999" height="36.900000000000006" rx="6" ry="6" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="547.3058333333333" y="134.45" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Idle</text>
</g>
<g class="node" data-id="Connecting" data-label="Plan is attached to the snapshot" data-shape="rounded">
  <rect x="435.5583333333333" y="269.20000000000005" width="223.495" height="36.900000000000006" rx="6" ry="6" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="547.3058333333333" y="287.65000000000003" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Plan is attached to the snapshot</text>
</g>
<g class="node" data-id="Running" data-label="Live FramePacket to SlamUpdate flow is active" data-shape="rounded">
  <rect x="237.40200000000004" y="422.40000000000003" width="310.1919999999999" height="36.900000000000006" rx="6" ry="6" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="392.498" y="440.85" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Live FramePacket to SlamUpdate flow is active</text>
</g>
<g class="node" data-id="Completed" data-label="Bounded replay reached EOF" data-shape="rounded">
  <rect x="40" y="563.6000000000001" width="217.56699999999998" height="36.900000000000006" rx="6" ry="6" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="148.7835" y="582.0500000000002" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Bounded replay reached EOF</text>
</g>
<g class="node" data-id="Stopped" data-label="User or caller requested stop" data-shape="rounded">
  <rect x="285.567" y="563.6000000000001" width="213.86199999999997" height="36.900000000000006" rx="6" ry="6" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="392.498" y="582.0500000000002" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">User or caller requested stop</text>
</g>
<g class="node" data-id="Failed" data-label="Pre-launch or runtime error occurred" data-shape="rounded">
  <rect x="527.429" y="563.6000000000001" width="262.02700000000004" height="36.900000000000006" rx="6" ry="6" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="658.4425" y="582.0500000000002" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Pre-launch or runtime error occurred</text>
</g>
</svg>
