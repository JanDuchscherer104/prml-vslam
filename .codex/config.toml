model                          = "gpt-5.4"
model_auto_compact_token_limit = 800000
model_context_window           = 1050000
model_reasoning_effort         = "xhigh"
personality                    = 'pragmatic'
web_search                     = 'cached'

project_doc_fallback_filenames = ["AGENTS.md"]

[mcp_servers]

    # Bootstrap once with:
    #   docker mcp profile pull docker.io/janduchscherer104/codex:latest
    [mcp_servers.MCP_DOCKER]
    command = "docker"
    args    = ["mcp", "gateway", "run", "--profile", "codex"]

    [mcp_servers.code-index]
    type    = "stdio"
    command = "uvx"
    args    = ["code-index-mcp"]

    [mcp_servers.graphify]
    type = "stdio"
    command = "uv"
    args = [
        "run",
        "--preview-features",
        "extra-build-dependencies",
        "--group",
        "dev",
        "python",
        "-m",
        "graphify.serve",
        "graphify-out/graph.json",
    ]

    [mcp_servers.mempalace]
    type    = "stdio"
    command = "bash"
    args    = [
        "-lc",
        "cd \"$(git rev-parse --show-toplevel)\" && exec .venv/bin/python -m mempalace.mcp_server --palace .artifacts/mempalace/palace",
    ]

[features]
unified_exec = true
multi_agent  = true
apps         = true
codex_hooks  = true

[[skills.config]]
path    = "../.agents/skills/pydantic"
enabled = true

[[skills.config]]
path    = "../.agents/skills/understanding-streamlit-architecture"
enabled = true

[[skills.config]]
path    = "../.agents/skills/graphify"
enabled = true

[[skills.config]]
path    = "../.agents/skills/mempalace-repo"
enabled = true

[[skills.config]]
path    = "../.agents/skills/rerun-slam-integration"
enabled = true
