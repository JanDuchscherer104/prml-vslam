    "src/prml_vslam/pipeline/ray_runtime/supervisor.py",
    "src/prml_vslam/pipeline/sinks/rerun.py",
    "src/prml_vslam/methods/factory.py",
    "src/prml_vslam/app/models.py",
    "src/prml_vslam/app/pages/advio.py",
    "src/prml_vslam/app/pipeline_controller.py",
    "src/prml_vslam/app/pages/pipeline_request_editor.py",
    "src/prml_vslam/app/pages/pipeline_snapshot_view.py",
    "src/prml_vslam/app/pages/record3d.py",
]
notes = [
    "The repo already owns `OfflineSequenceSource`, `StreamingSequenceSource`, and the `BackendSpec` union, so most of these `object` surfaces are not expressing a genuinely open-ended contract.",
    "Current examples include `runtime_source: object` in `PipelineBackend`, `RayPipelineBackend`, `RunService`, and `PipelineSupervisorActor`, `backend_spec: object` and `-> object` in `methods.factory`, and `run_service: object` in the Pipeline snapshot view.",
    "The Ray runtime still erases event and telemetry contracts with `list[object]` events, `source: object`, `intrinsics: object`, `pose: object`, and `_rerun_sink: object | None` even though the surrounding pipeline already owns `RunEvent`, source protocols, `CameraIntrinsics`, `FrameTransform`, and a concrete `RerunEventSink`.",
    "The app/controller side still widens typed replay data with `build_streaming_source_from_action() -> object`, `previewable_statuses: list[object]`, `slam_backend_payload: dict[str, object]`, and `RunSnapshot.latest_backend_event: dict[str, object] | None`.",
    "The current public snapshot still exports raw/ad hoc telemetry such as `RunSnapshot.latest_backend_event: dict[str, object] | None` and `StreamingRunSnapshot.trajectory_positions_xyz`, and multiple Streamlit pages consume those fields directly instead of depending on a typed projection seam.",
    "This is the clearest remaining anti-pattern relative to the new package guidance because it blocks static discovery of exactly the seams the codebase already declared.",
]
