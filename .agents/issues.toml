[[issues]]
id = "ISSUE-0040"
title = "Typed pipeline and method seams still degrade to object-typed boundaries"
status = "open"
priority = "high"
category = "architecture"
summary = "The repo already defines protocol seams and discriminated backend specs, but the main orchestration path still widens them back to `object` or `Any` across pipeline, Ray, factory, controller, and app seams, which weakens language-server guidance and makes the declared typed boundaries largely decorative."
