[[issues]]
id = "ISSUE-0041"
title = "The ViSTA adapter still relies on global import-path mutation and private upstream APIs"
status = "open"
priority = "high"
category = "integration"
summary = "The ViSTA integration is now more direct than the older defensive version, but it still mutates `sys.path`, scans site-packages for shared libraries, and reaches into private upstream methods, which leaves the external-method boundary brittle and hard to reason about."
files = [
    "src/prml_vslam/methods/vista/adapter.py",
    "src/prml_vslam/methods/vista/config.py",
    "src/prml_vslam/methods/README.md",
    "src/prml_vslam/AGENTS.md",
]
notes = [
    "The adapter currently inserts the repo-local ViSTA checkout into `sys.path` at runtime instead of keeping the import boundary explicit.",
    "It also calls `_crop_resize_if_necessary_image_only` and preloads `libDBoW3.so.0.0` by probing site-packages and the upstream build tree.",
    "Concrete hotspots now live in `_inject_sys_path()`, `_preload_dbow3_shared_library()`, and `_UpstreamVistaFramePreprocessor.prepare()`, so the remaining debt is the import and dependency seam rather than the normalized output contracts.",
    "The adapter already converts upstream poses and intrinsics back into `FrameTransform` and `CameraIntrinsics`, which means the wrapper boundary can be tightened without redesigning the downstream pipeline contracts.",
    "Those choices are understandable for a first integration, but they still violate the intended thin-wrapper boundary around external systems.",
]
sources = [
