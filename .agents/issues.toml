[[issues]]
id = "ISSUE-0009"
title = "Method wrapper contracts still duplicate pipeline artifact ownership"
status = "open"
priority = "medium"
category = "architecture"
summary = "The methods layer still exposes `MethodRunRequest` and `MethodRunResult` as public normalized-output contracts even though the architecture guide already treats `SequenceManifest`, `SlamArtifacts`, and `RunSummary` as the repository-owned artifact boundary."
files = [
    "docs/architecture/interfaces-and-contracts.md",
    "src/prml_vslam/methods/contracts.py",
    "src/prml_vslam/methods/base.py",
    "tests/test_methods.py",
]
notes = [
    "The mock method runtime still plans and materializes normalized trajectory and point-cloud paths directly through `MethodRunResult`.",
    "The architecture guide explicitly calls this overlap transitional and says wrapper outputs should converge on pipeline-owned artifacts.",
    "The broader older review recommendation to keep upstream wrappers thin is still relevant here even though the current repository scope intentionally keeps `methods` mock-only.",
]
sources = [
    "README.md",
