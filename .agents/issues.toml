[[issues]]
id = "ISSUE-0053"
title = "Repo-owned Rerun point-cloud/world-frame semantics regressed after the policy-extraction cleanup"
status = "in_progress"
priority = "high"
category = "visualization"
summary = "The current sink keeps ViSTA pointmaps camera-local in contracts, but the live viewer path now shows clouds clustered near the origin again and the repo's persisted Rerun guidance is internally inconsistent about root-world convention, entity layout, and what behavior is considered the 'working' reference."
wip_branch = "codex/streaming-execution-architecture"
wip_worktree = "/home/jandu/repos/prml-vslam"
files = [
    "src/prml_vslam/pipeline/sinks/rerun.py",
    "src/prml_vslam/pipeline/sinks/rerun_policy.py",
    "src/prml_vslam/visualization/rerun.py",
    "src/prml_vslam/methods/vista/adapter.py",
    "src/prml_vslam/visualization/README.md",
    "src/prml_vslam/visualization/REQUIREMENTS.md",
    ".agents/AGENTS_INTERNAL_DB.md",
    "external/vista-slam/run.py",
    "external/vista-slam/run_live.py",
    "tests/test_streaming_visualization.py",
    "tests/test_rerun_timeline_semantics.py",
    "tests/test_rerun_layout_semantics.py",
]
notes = [
    "The current ViSTA adapter still emits camera-local pointmaps from `get_pointmap_vis(...)` and canonical repo `T_world_camera` poses, so the regression is not explained by payload generation alone.",
    "The current sink logs explicit point clouds under `world/live/model/points` and `world/keyframes/<id>/points` beneath shared posed parents, which is structurally closer to upstream ViSTA than the older repo-owned posed-pointmap-branch layout.",
    "The current persisted guidance is inconsistent: `visualization/REQUIREMENTS.md` says the ViSTA-aligned path should preserve upstream-native world semantics and keep camera-local pointmaps composed through posed pointmap branches, while `.agents/AGENTS_INTERNAL_DB.md` still records a 'stable lesson' that the live Rerun root world should be declared as `ViewCoordinates.RDF`.",
    "Upstream ViSTA logs `/world` as an identity `Transform3D`, logs the pose directly on `world/est/<topic>`, logs `Pinhole(..., camera_xyz=RDF)` on `world/est/<topic>/cam`, and logs camera-local `Points3D` on `world/est/<topic>/points`; it does not log root `ViewCoordinates`, explicit `DepthImage`, source-vs-model branches, or a separate tracking branch.",
    "The current tests validate helper math and mocked event ordering, but they do not exercise actual Rerun transform inheritance or compare the repo-owned recording against a minimal ViSTA-style recording with the same pose and pointmap payloads.",
]
sources = [
    "src/prml_vslam/pipeline/sinks/rerun.py",
