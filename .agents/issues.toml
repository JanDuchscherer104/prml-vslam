[[issues]]
id = "ISSUE-0046"
title = "Late stop requests can still rewrite completed streaming runs to STOPPED"
status = "open"
priority = "medium"
category = "orchestration"
summary = "A completed streaming run can still be mutated to `STOPPED` because `stop()` appends `run.stopped` after the worker finishes and the snapshot projector applies that terminal state unconditionally."
files = [
    "src/prml_vslam/pipeline/ray_runtime/coordinator.py",
    "src/prml_vslam/pipeline/snapshot_projector.py",
    "src/prml_vslam/pipeline/run_service.py",
]
notes = [
    "`RunService.start_run()` stops the previous run before launching the next one, so this is not only a manual-stop corner case.",
    "The projector correctly guards `RunStopRequested` from overwriting `COMPLETED` or `FAILED`, but `RunStopped` still forces `STOPPED` even after successful completion.",
    "That means terminal state history for streaming runs is still mutable after completion and can disagree with what actually happened.",
]
sources = [
    "src/prml_vslam/pipeline/ray_runtime/coordinator.py",
    "src/prml_vslam/pipeline/snapshot_projector.py",
    "src/prml_vslam/pipeline/run_service.py",
]

