title = "Record3D Wi-Fi preview remains a large repo-owned subsystem for a preview-only path"
status = "open"
priority = "medium"
category = "maintainability"
summary = "USB is documented as the canonical Record3D integration, but the repo still carries a bespoke Wi-Fi signaling, WebRTC receiver, packet-decoding, and session stack for the optional preview fallback."
files = [
    "src/prml_vslam/io/wifi_session.py",
    "src/prml_vslam/io/wifi_receiver.py",
    "src/prml_vslam/io/wifi_packets.py",
    "src/prml_vslam/io/wifi_signaling.py",
    "src/prml_vslam/io/README.md",
    "README.md",
]
notes = [
    "The current Wi-Fi implementation is intentionally preview-only, lower fidelity, and missing the full pose/confidence surfaces available on USB.",
    "Even with that limited role, the path still owns custom signaling, worker, and decoding logic that materially increases the size of `io/`.",
    "This remains a relevant LOC-reduction target from the older reviews, even though the current docs already scope it correctly.",
]
