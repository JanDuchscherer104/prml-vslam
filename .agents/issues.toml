[[issues]]
id = "ISSUE-0003"
title = "Live preview snapshot contracts are not owned consistently by app models"
status = "open"
priority = "medium"
category = "architecture"
summary = "App-facing preview snapshots still live outside `prml_vslam.app.models`: `Record3DStreamSnapshot` is owned by `prml_vslam.io.record3d`, while `AdvioPreviewSnapshot` and `AdvioPreviewStreamState` are still defined in `prml_vslam.app.services`."
files = [
    "src/prml_vslam/io/record3d.py",
    "src/prml_vslam/app/services.py",
    "src/prml_vslam/app/models.py",
    "src/prml_vslam/app/pages/record3d.py",
    "tests/test_app.py",
]
notes = [
    "The Streamlit app imports these runtime snapshots directly for rendering and test doubles.",
    "This still blurs two repo rules: app-facing state belongs under `prml_vslam.app.models`, and `services.py` should not own public contract types.",
]
sources = [
    "docs/architecture/interfaces-and-contracts.md",
    "src/prml_vslam/AGENTS.md",
    "src/prml_vslam/app/AGENTS.md",
    "src/prml_vslam/io/record3d.py",
