[[issues]]
id = "ISSUE-0036"
title = "Repo-owned Rerun transform relation contradicts the canonical camera pose direction"
status = "open"
priority = "high"
category = "visualization"
summary = "The repo stores camera poses as `T_world_camera`, but `visualization.rerun.log_transform()` logs them as `rr.TransformRelation.ChildFromParent`, which reverses the declared pose direction and is the strongest current explanation for misplaced camera-local pointmaps and incorrect world unprojection in the repo-owned viewer path."
files = [
    "src/prml_vslam/AGENTS.md",
    "src/prml_vslam/interfaces/transforms.py",
    "src/prml_vslam/visualization/rerun.py",
    "src/prml_vslam/pipeline/streaming.py",
    "src/prml_vslam/pipeline/streaming_coordinator.py",
    "tests/test_streaming_visualization.py",
    "src/prml_vslam/visualization/README.md",
    "src/prml_vslam/visualization/REQUIREMENTS.md",
]
notes = [
    "`FrameTransform` and the package guidance define the canonical camera pose convention as world <- camera (`T_world_camera`).",
    "`log_transform()` emits that pose with `rr.TransformRelation.ChildFromParent`, while `streaming_coordinator` logs camera-local pointmaps under posed keyframe entities that inherit the transform.",
    "`streaming._viewer_pose_from_update()` also applies a ViSTA-specific basis flip before logging, so transform-direction mistakes and viewer-basis conversion are currently coupled in one path.",
    "Current streaming visualization tests assert entity paths, timelines, and basis values, but they do not round-trip a known camera-local point into an expected world-space location.",
]
sources = [
    "src/prml_vslam/AGENTS.md",
    "src/prml_vslam/interfaces/transforms.py",
    "src/prml_vslam/visualization/rerun.py",
    "src/prml_vslam/pipeline/streaming.py",
    "src/prml_vslam/pipeline/streaming_coordinator.py",
    "tests/test_streaming_visualization.py",
    "src/prml_vslam/visualization/README.md",
]

[[issues]]
id = "ISSUE-0037"
title = "Live Rerun updates drop intrinsics and metric depth, so camera unprojection cannot be validated"
status = "open"
priority = "medium"
category = "visualization"
summary = "The live ViSTA adapter requests depth and intrinsics, but `SlamUpdate` only carries `pointmap` and `preview_rgb`, the repo-owned viewer path never logs `Pinhole` or `DepthImage`, and the current `preview_rgb` payload is a pseudo-colored XYZ preview rather than raw RGB or metric depth."
files = [
    "src/prml_vslam/methods/updates.py",
    "src/prml_vslam/methods/vista/adapter.py",
    "src/prml_vslam/visualization/rerun.py",
    "src/prml_vslam/pipeline/streaming_coordinator.py",
    "tests/test_methods.py",
    "src/prml_vslam/visualization/README.md",
    "src/prml_vslam/visualization/REQUIREMENTS.md",
]
notes = [
    "`VistaSlamSession._build_live_update()` calls `get_view(... return_depth=True, return_intri=True)` but drops `view.depth` and `view.intri` after requesting them.",
    "`get_pointmap_vis()` returns a pseudo-colored visualization plus a camera-local pointmap, yet the repo stores the first payload as `preview_rgb` and logs it with `rr.Image` semantics.",
    "Without typed intrinsics and metric depth in `SlamUpdate`, the repo-owned viewer path cannot log `Pinhole` frusta or `DepthImage` backprojections keyed to the same raster as the pointmap.",
    "Explicit trajectory polylines and a separate world-space dense cloud are also still missing, but the camera-model and depth gap is the first blocker to trustworthy unprojection debugging.",
]
sources = [
    "src/prml_vslam/methods/updates.py",
    "src/prml_vslam/methods/vista/adapter.py",
    "src/prml_vslam/visualization/rerun.py",
    "src/prml_vslam/pipeline/streaming_coordinator.py",
    "tests/test_methods.py",
    "src/prml_vslam/visualization/README.md",
    "external/vista-slam/run.py",
    "external/vista-slam/run_live.py",
    "external/vista-slam/vista_slam/slam.py",
]

