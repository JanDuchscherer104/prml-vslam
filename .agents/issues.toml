    "src/prml_vslam/pipeline/ray_runtime/coordinator.py",
    "src/prml_vslam/pipeline/stages/base/config.py",
    "src/prml_vslam/pipeline/stages/base/proxy.py",
]
notes = [
    "The target docs make `RunConfig`, `StageBundle`, `StageConfig`, `RuntimeManager`, `StageRuntimeProxy`, `StageRunner`, and `StageResultStore` the ownership model for stages.",
    "PR #68 has implemented many of these targets, but the coordinator still owns too many concerns and stage-domain module shapes are not yet uniform.",
    "This issue tracks the architectural debt separately from narrow implementation bugs so future docstrings and refactor work can point readers to the target ownership model without pretending the migration is complete.",
]
sources = [
