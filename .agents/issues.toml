id = "ISSUE-0070"
title = "StageRuntimeUpdate semantic events accept arbitrary BaseData"
status = "open"
priority = "medium"
category = "runtime"
summary = "The live runtime-update transport currently accepts any BaseData in semantic_events, which weakens the boundary between domain-owned live notices and generic pipeline transport."
