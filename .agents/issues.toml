[[issues]]
id = "ISSUE-0044"
title = "Run coordinator restart policy is unsafe without event-log restore"
status = "open"
priority = "high"
category = "orchestration"
summary = "The Ray run coordinator is restartable even though it still rebuilds empty in-memory state after crashes and cannot restore from the durable JSONL event log, so a restart can silently fork the semantic truth for an active run."
files = [
    "src/prml_vslam/pipeline/ray_runtime/coordinator.py",
    "src/prml_vslam/pipeline/ray_runtime/supervisor.py",
    ".agents/work/pipeline-refactor/10-agent_context_ray_pipeline.md",
    ".agents/work/pipeline-refactor/13-codex-plan.md",
]
notes = [
    "The frozen plan explicitly allowed the supervisor actor to be restartable first, but deferred coordinator restarts until checkpoint/projection restore exists.",
    "The current coordinator constructor recreates snapshot, event, handle, and stage-outcome state from scratch and `start()` seeds a fresh run instead of replaying the durable event log.",
    "A coordinator crash during an active run would therefore revive a new empty state owner behind the same logical run id and violate the event-projected truth model.",
]
sources = [
    "src/prml_vslam/pipeline/ray_runtime/coordinator.py",
    "src/prml_vslam/pipeline/ray_runtime/supervisor.py",
    ".agents/work/pipeline-refactor/10-agent_context_ray_pipeline.md",
    ".agents/work/pipeline-refactor/13-codex-plan.md",
]

[[issues]]
id = "ISSUE-0045"
title = "Terminal stage errors still bypass the `stage.failed` event path"
status = "open"
priority = "high"
category = "orchestration"
summary = "The runtime defines a stage-scoped failure event, but terminal exceptions still collapse directly into `run.failed`, so failing stage outcomes, registry failure modes, and stage-level provenance are not represented in the durable event stream."
files = [
    "src/prml_vslam/pipeline/contracts/events.py",
    "src/prml_vslam/pipeline/ray_runtime/coordinator.py",
    "src/prml_vslam/pipeline/stage_registry.py",
    ".agents/work/pipeline-refactor/13-codex-plan.md",
]
notes = [
    "The top-level coordinator exception path still emits only `RunFailed`, and the streaming finalization path does the same when `_streaming_error` is set.",
    "That leaves the declared `StageFailed` contract unused by the active runtime even though stage keys, failure modes, and `StageOutcome` already exist.",
    "Without a durable stage-scoped terminal event, the event log cannot explain which stage failed or preserve the same provenance shape as successful stages.",
]
sources = [
    "src/prml_vslam/pipeline/contracts/events.py",
    "src/prml_vslam/pipeline/ray_runtime/coordinator.py",
    "src/prml_vslam/pipeline/stage_registry.py",
    ".agents/work/pipeline-refactor/13-codex-plan.md",
